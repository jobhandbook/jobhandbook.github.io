<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<link rel="stylesheet" href="css/style.css" />
</head>
<body>

<header class="site-header">
  <div class="wrap">
    <a class="brand" href="index.html">서재민 <span>Joey Seo</span></a>
    <button class="nav-toggle" aria-label="메뉴 열기">☰</button>
    <nav class="main-nav">
      <ul>
        <li><a href="index.html">홈</a></li>
        <li><a href="insights.html">인사이트</a></li>
        <li><a href="services.html">서비스</a></li>
        <li><a href="about.html">프로필&amp;증빙</a></li>
        <li><a href="book.html">저서</a></li>
        <li><a href="media.html">보도</a></li>
        <li><a class="nav-cta" href="contact.html">문의하기</a></li>
      </ul>
    </nav>
  </div>
</header>

<section class="block" style="padding-top:56px;">
  <div class="wrap">
    <div style="margin-bottom:28px;">
      <a href="insights.html" style="color:var(--text-faint); font-size:13.5px; font-weight:700;">← 인사이트 목록으로</a>
    </div>
    <article class="post-article" id="postArticle">
      <p style="color:var(--text-faint);">불러오는 중...</p>
    </article>
  </div>
</section>

<footer class="site-footer">
  <div class="wrap" style="display:flex; justify-content:space-between; flex-wrap:wrap; gap:12px; width:100%;">
    <div>© 2026 Joey Seo. All rights reserved.</div>
    <div>
      <a href="mailto:joey.seo7@gmail.com">joey.seo7@gmail.com</a> ·
      <a href="https://www.linkedin.com/in/joeyseo" target="_blank" rel="noopener">LinkedIn</a> ·
      <a href="privacy.html">개인정보처리방침</a>
    </div>
  </div>
</footer>

<script src="js/main.js"></script>
<script>
(function () {
  const params = new URLSearchParams(location.search);
  const slug = params.get("slug");
  const el = document.getElementById("postArticle");

  fetch("posts/index.json")
    .then((r) => r.json())
    .then((data) => {
      const post = data.find((p) => p.slug === slug);
      if (!post) {
        el.innerHTML = '<p style="color:var(--text-faint);">글을 찾을 수 없습니다.</p>';
        return;
      }
      document.title = post.title + " | 서재민 (Joey Seo)";
      const paragraphs = post.body
        .split(/\n\s*\n/)
        .map((p) => `<p>${p.replace(/\n/g, "<br>")}</p>`)
        .join("");
      el.innerHTML = `
        <span class="topic-tag">${post.tags[0] || ""}</span>
        <div class="date">${post.date}</div>
        <h1>${post.title}</h1>
        <div class="body">${paragraphs}</div>
      `;
    })
    .catch(() => {
      el.innerHTML = '<p style="color:var(--text-faint);">글을 불러오지 못했습니다.</p>';
    });
})();
</script>
</body>
</html>
