<script src="js/main.js"></script>
<script>
(function () {
  let allPosts = [];
  let activeTag = null;

  function render() {
    const grid = document.getElementById("postGrid");
    const posts = activeTag ? allPosts.filter((p) => p.tags.includes(activeTag)) : allPosts;
    if (!posts.length) {
      grid.innerHTML = '<p style="color:var(--text-faint);">아직 글이 없습니다.</p>';
      return;
    }
    grid.innerHTML = posts
      .map(
        (p) => `
      <div class="post-card">
        <span class="topic-tag">${p.tags[0] || ""}</span>
        <div class="date">${p.date}</div>
        <h3>${p.title}</h3>
        <p>${p.excerpt}</p>
        <a class="read-more" href="post.html?slug=${encodeURIComponent(p.slug)}">더 읽기 →</a>
      </div>`
      )
      .join("");
  }

  function renderFilters() {
    const tags = [...new Set(allPosts.flatMap((p) => p.tags))];
    const row = document.getElementById("filterRow");
    row.innerHTML =
      `<span class="filter-chip${activeTag === null ? " active" : ""}" data-tag="">전체</span>` +
      tags.map((t) => `<span class="filter-chip${activeTag === t ? " active" : ""}" data-tag="${t}">${t}</span>`).join("");
    row.querySelectorAll(".filter-chip").forEach((chip) => {
      chip.addEventListener("click", () => {
        activeTag = chip.dataset.tag || null;
        renderFilters();
        render();
      });
    });
  }

  fetch("posts/index.json")
    .then((r) => r.json())
    .then((data) => {
      allPosts = data.slice().sort((a, b) => (a.date < b.date ? 1 : -1));
      renderFilters();
      render();
    })
    .catch(() => {
      document.getElementById("postGrid").innerHTML =
        '<p style="color:var(--text-faint);">글을 불러오지 못했습니다.</p>';
    });
})();
</script>
</body>
</html>
